name = "leeeeeoy-portfolio-backend"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "leeeeeoy-portfolio"
database_id = "36b2bc88-3d60-438d-8f98-f5d48c5682aa"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "leeeeeoy-portfolio-assets"
# binding name in Worker code: BUCKET

[vars]
ENVIRONMENT = "production"
ASSETS_BASE_URL = "https://assets.leeeeeoy.xyz"
